<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Front of House · Restaurant Order Flow</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      ORDER FLOW
      <span class="sub">v1.0 · FOH</span>
    </div>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/order-entry.html">Entry</a>
      <a href="/kitchen.html">Kitchen</a>
      <a href="/foh.html" class="active">FOH</a>
      <a href="/manager.html">Manager</a>
    </nav>
    <div class="connection">
      <span class="pulse"></span>
      <span class="state">Live</span>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div>
        <h1>Front of House</h1>
        <p>Tickets ready to run are at the top. Below, see what's still cooking so you can set expectations with the table.</p>
      </div>
    </div>

    <h2 style="font-family: var(--font-display); font-size: 18px; margin: 18px 0 12px; color: var(--accent-ok);">
      Ready to run
    </h2>
    <div id="ready" class="ticket-grid"></div>

    <h2 id="cancelledHeading" style="font-family: var(--font-display); font-size: 18px; margin: 36px 0 12px; color: var(--accent-hot); display: none;">
      Recently cancelled
    </h2>
    <div id="cancelled" class="ticket-grid" style="display: none;"></div>

    <h2 style="font-family: var(--font-display); font-size: 18px; margin: 36px 0 12px; color: var(--text-muted);">
      In the kitchen
    </h2>
    <div id="inFlight" class="ticket-grid"></div>
  </main>

  <script src="/js/shared.js"></script>
  <script src="/js/foh.js"></script>
</body>
</html>
